<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f6471"/>
      <stop offset="1" stop-color="#244e58"/>
    </linearGradient>
    <linearGradient id="feather" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d8e6e9"/>
    </linearGradient>
    <clipPath id="vaneClip">
      <path d="M64 14 C 92 36, 100 70, 78 108 C 60 118, 44 112, 36 96 C 36 70, 46 40, 64 14 Z"/>
    </clipPath>
  </defs>

  <rect width="128" height="128" rx="22" ry="22" fill="url(#bg)"/>

  <g transform="rotate(-8 64 64)">
    <!-- vane -->
    <path d="M64 14 C 92 36, 100 70, 78 108 C 60 118, 44 112, 36 96 C 36 70, 46 40, 64 14 Z"
          fill="url(#feather)"/>

    <!-- barb hints, clipped to the vane shape -->
    <g clip-path="url(#vaneClip)" stroke="#244e58" stroke-width="1.4" stroke-linecap="round" opacity="0.18">
      <line x1="62" y1="22" x2="42" y2="34"/>
      <line x1="64" y1="32" x2="40" y2="46"/>
      <line x1="66" y1="42" x2="40" y2="58"/>
      <line x1="68" y1="52" x2="40" y2="70"/>
      <line x1="70" y1="62" x2="42" y2="82"/>
      <line x1="72" y1="72" x2="46" y2="94"/>
      <line x1="74" y1="82" x2="52" y2="104"/>
      <line x1="76" y1="92" x2="60" y2="110"/>

      <line x1="62" y1="22" x2="74" y2="34"/>
      <line x1="64" y1="32" x2="80" y2="46"/>
      <line x1="66" y1="42" x2="84" y2="58"/>
      <line x1="68" y1="52" x2="86" y2="70"/>
      <line x1="70" y1="62" x2="84" y2="82"/>
      <line x1="72" y1="72" x2="80" y2="94"/>
    </g>

    <!-- shaft (rachis) -->
    <path d="M64 16 C 70 40, 74 70, 70 110"
          fill="none" stroke="#244e58" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>
