name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Plume.sln

      - name: Build
        run: dotnet build Plume.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Plume.sln --configuration Release --no-build

      - name: Pack
        run: |
          dotnet pack src/Plume/Plume.csproj                     -c Release --no-build -o ./artifacts
          dotnet pack src/Plume.OpenAI/Plume.OpenAI.csproj       -c Release --no-build -o ./artifacts
          dotnet pack src/Plume.Anthropic/Plume.Anthropic.csproj -c Release --no-build -o ./artifacts
          dotnet pack src/Plume.Google/Plume.Google.csproj       -c Release --no-build -o ./artifacts
          dotnet pack src/Plume.Ollama/Plume.Ollama.csproj       -c Release --no-build -o ./artifacts

      - name: List artifacts
        run: ls -lh ./artifacts

      - name: Push to NuGet
        run: |
          shopt -s nullglob
          nupkgs=(./artifacts/*.nupkg)
          snupkgs=(./artifacts/*.snupkg)
          echo "Found ${#nupkgs[@]} .nupkg and ${#snupkgs[@]} .snupkg files."
          if [ ${#snupkgs[@]} -eq 0 ]; then
            echo "::warning::No .snupkg files were produced — symbols will not be published."
          fi
          for pkg in "${nupkgs[@]}" "${snupkgs[@]}"; do
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true
